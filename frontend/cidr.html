<!DOCTYPE html>

<html>

<head>

<title>CIDR Summarization Tool</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="bg-gray-900 text-white p-5 text-center text-xl font-bold">
CIDR Summarization Tool
</div>

<div class="max-w-xl mx-auto mt-10">

<a href="index.html" class="text-blue-600">← Back to Tools</a>

<div class="bg-white p-6 rounded-xl shadow mt-4">

<textarea 
id="networks"
placeholder="Enter networks separated by comma

Example:
192.168.0.0/24,192.168.1.0/24"
class="w-full border p-3 rounded"
rows="4"
></textarea>

<button
onclick="summarize()"
class="mt-4 bg-blue-600 text-white px-4 py-2 rounded"

>

Summarize </button>

<div id="result" class="mt-4 text-gray-700"></div>

</div>

</div>

<script>

async function summarize(){

let networks=document.getElementById("networks").value

document.getElementById("result").innerHTML="Calculating..."

try{

const response=await fetch(
"https://network-toolkit-api.onrender.com/cidr?networks="+encodeURIComponent(networks)
)

const data=await response.json()

document.getElementById("result").innerHTML=
"<b>Summary:</b><br>"+data.summary.join("<br>")

}catch(err){

document.getElementById("result").innerHTML="API Error"

}

}

</script>

</body>

</html>
