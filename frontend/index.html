<!DOCTYPE html>

<html>

<head>

<title>Network Engineer Toolkit</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- HEADER -->

<div class="bg-gray-900 text-white p-5 text-center text-xl font-bold">
Network Engineer Toolkit
</div>

<!-- SEARCH BAR -->

<div class="max-w-xl mx-auto mt-8">

<input 
id="search"
onkeyup="searchTools()"
placeholder="Search tools..."
class="w-full p-3 rounded-lg border shadow"
/>

</div>

<!-- TOOL GRID -->

<div id="tools" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl mx-auto mt-10 p-4">

<a href="subnet.html" class="tool bg-white p-6 rounded-xl shadow hover:shadow-lg text-center">

<div class="text-3xl mb-3">🌐</div>

<div class="font-semibold text-lg">
Subnet Calculator
</div>

</a>

<a href="bgp.html" class="tool bg-white p-6 rounded-xl shadow hover:shadow-lg text-center">

<div class="text-3xl mb-3">📡</div>

<div class="font-semibold text-lg">
BGP Config Generator
</div>

</a>

<a href="iprange.html" class="tool bg-white p-6 rounded-xl shadow hover:shadow-lg text-center">

<div class="text-3xl mb-3">📊</div>

<div class="font-semibold text-lg">
IP Range Calculator
</div>

</a>

</div>

<script>

function searchTools(){

let input=document.getElementById("search").value.toLowerCase()

let tools=document.getElementsByClassName("tool")

for(let i=0;i<tools.length;i++){

let text=tools[i].innerText.toLowerCase()

if(text.includes(input)){
tools[i].style.display="block"
}else{
tools[i].style.display="none"
}

}

}

</script>

</body>

</html>
