<!DOCTYPE html>

<html>

<head>

<title>Interface Config Generator</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="bg-gray-900 text-white p-5 text-center text-xl font-bold">
Interface Config Generator
</div>

<div class="max-w-xl mx-auto mt-10">

<a href="index.html" class="text-blue-600">← Back to Tools</a>

<div class="bg-white p-6 rounded-xl shadow mt-4">

<input id="interface" placeholder="Interface (example: GigabitEthernet0/0)" class="w-full border p-3 rounded mb-3">

<input id="ip" placeholder="IP Address (example: 10.0.0.1)" class="w-full border p-3 rounded mb-3">

<input id="mask" placeholder="Subnet Mask (example: 255.255.255.0)" class="w-full border p-3 rounded mb-3">

<input id="description" placeholder="Description (example: WAN_LINK)" class="w-full border p-3 rounded">

<button onclick="generateConfig()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">
Generate Config
</button>

<div id="result" class="mt-6 text-sm"></div>

</div>

</div>

<script>

async function generateConfig(){

let interfaceName=document.getElementById("interface").value
let ip=document.getElementById("ip").value
let mask=document.getElementById("mask").value
let description=document.getElementById("description").value

const response=await fetch(
"https://network-toolkit-api.onrender.com/interface?interface="+
encodeURIComponent(interfaceName)+
"&ip="+encodeURIComponent(ip)+
"&mask="+encodeURIComponent(mask)+
"&description="+encodeURIComponent(description)
)

const data=await response.json()

let html=""

html+="<h3 class='font-semibold mt-4'>Cisco</h3>"
html+="<pre class='bg-gray-900 text-green-400 p-3 rounded overflow-x-auto'>"+data.cisco+"</pre>"

html+="<h3 class='font-semibold mt-4'>Juniper</h3>"
html+="<pre class='bg-gray-900 text-green-400 p-3 rounded overflow-x-auto'>"+data.juniper+"</pre>"

html+="<h3 class='font-semibold mt-4'>Arista</h3>"
html+="<pre class='bg-gray-900 text-green-400 p-3 rounded overflow-x-auto'>"+data.arista+"</pre>"

document.getElementById("result").innerHTML=html

}

</script>

</body>

</html>
