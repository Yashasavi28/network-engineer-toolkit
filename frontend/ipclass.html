<h2>IP Class Detector</h2>

<div class="example">

<b>Example</b><br>
IP Address: <b>192.168.1.1</b><br><br>

<button onclick="fillExample()">Use Example</button>

</div>

<input id="ip" placeholder="Enter IPv4 Address (example: 192.168.1.1)">

<button onclick="detectClass()">Detect</button>

<div id="result" class="result"></div>

<button onclick="copyResult()" class="copybtn">
Copy Result
</button>

<button onclick="copyShareLink()" class="copybtn">
🔗 Copy Share Link
</button>

</div>

</div>

<script>

function fillExample(){
document.getElementById("ip").value="192.168.1.1"
}

async function detectClass(){

let ip=document.getElementById("ip").value.trim()

if(!ip){
alert("Enter IP address")
return
}

document.getElementById("result").innerHTML="Checking..."

try{

const response=await fetch(
"https://network-toolkit-api.onrender.com/ipclass?ip="+encodeURIComponent(ip)
)

const data=await response.json()

document.getElementById("result").innerHTML =
"<b>Class:</b> "+data.class+"<br>"+
"<b>Type:</b> "+data.type+"<br>"+
"<b>Range:</b> "+data.range

}catch(err){

document.getElementById("result").innerHTML="API Error"

}

}

function copyResult(){

let text=document.getElementById("result").innerText

if(!text){
alert("Nothing to copy")
return
}

navigator.clipboard.writeText(text)

alert("Result copied to clipboard")

}

function copyShareLink(){

let ip=document.getElementById("ip").value

if(!ip){
alert("Enter IP first")
return
}

let base=window.location.href.split("?")[0]

let url=base+"?ip="+encodeURIComponent(ip)

navigator.clipboard.writeText(url)

alert("🔗 Share link copied")

}

window.onload=function(){

const params=new URLSearchParams(window.location.search)

let ip=params.get("ip")

if(ip){

document.getElementById("ip").value=ip
detectClass()

}

}

</script>
