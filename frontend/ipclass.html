<!DOCTYPE html>

<html>

<head>

<title>IP Class Detector</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="bg-gray-900 text-white p-5 text-center text-xl font-bold">
IP Class Detector
</div>

<div class="max-w-xl mx-auto mt-10">

<a href="index.html" class="text-blue-600">← Back to Tools</a>

<div class="bg-white p-6 rounded-xl shadow mt-4">

<input
id="ip"
placeholder="Enter IPv4 Address (example: 192.168.1.1)"
class="w-full border p-3 rounded"
/>

<button
onclick="detectClass()"
class="mt-4 bg-blue-600 text-white px-4 py-2 rounded"

>

Detect </button>

<div id="result" class="mt-4 text-gray-700"></div>

</div>

</div>

<script>

async function detectClass(){

let ip=document.getElementById("ip").value

const response=await fetch(
"https://network-toolkit-api.onrender.com/ipclass?ip="+ip
)

const data=await response.json()

document.getElementById("result").innerHTML =
"<p><b>Class:</b> "+data.class+"</p>"+
"<p><b>Type:</b> "+data.type+"</p>"+
"<p><b>Range:</b> "+data.range+"</p>"

}

</script>

</body>

</html>
