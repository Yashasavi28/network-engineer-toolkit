<!DOCTYPE html>

<html>

<head>

<title>IPv6 Subnet Calculator</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="bg-gray-900 text-white p-5 text-center text-xl font-bold">
IPv6 Subnet Calculator
</div>

<div class="max-w-xl mx-auto mt-10">

<a href="index.html" class="text-blue-600">← Back to Tools</a>

<div class="bg-white p-6 rounded-xl shadow mt-4">

<input
id="network"
placeholder="Example: 2001:db8::/64"
class="w-full border p-3 rounded"
/>

<button
onclick="calculateIPv6()"
class="mt-4 bg-blue-600 text-white px-4 py-2 rounded"

>

Calculate </button>

<div id="result" class="mt-4 text-gray-700"></div>

</div>

</div>

<script>

async function calculateIPv6(){

let network=document.getElementById("network").value

document.getElementById("result").innerHTML="Calculating..."

try{

const response=await fetch(
"https://network-toolkit-api.onrender.com/ipv6?network="+encodeURIComponent(network)
)

const data=await response.json()

document.getElementById("result").innerHTML=
"<p><b>Network Address:</b> "+data.network_address+"</p>"+
"<p><b>Prefix Length:</b> /"+data.prefix_length+"</p>"+
"<p><b>Total Addresses:</b> "+data.num_addresses+"</p>"

}catch(err){

document.getElementById("result").innerHTML="API Error"

}

}

</script>

</body>

</html>
