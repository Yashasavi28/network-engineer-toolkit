<!DOCTYPE html>

<html>

<head>

<title>VLSM Calculator</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="bg-gray-900 text-white p-5 text-center text-xl font-bold">
VLSM Calculator
</div>

<div class="max-w-xl mx-auto mt-10">

<a href="index.html" class="text-blue-600">← Back to Tools</a>

<div class="bg-white p-6 rounded-xl shadow mt-4">

<input
id="network"
placeholder="Network (example: 192.168.0.0/24)"
class="w-full border p-3 rounded mb-3"
/>

<input
id="hosts"
placeholder="Hosts needed (example: 50,20,10)"
class="w-full border p-3 rounded"
/>

<button
onclick="calculateVLSM()"
class="mt-4 bg-blue-600 text-white px-4 py-2 rounded"

>

Calculate </button>

<div id="result" class="mt-4"></div>

</div>

</div>

<script>

async function calculateVLSM(){

let network=document.getElementById("network").value
let hosts=document.getElementById("hosts").value

const response=await fetch(
"https://network-toolkit-api.onrender.com/vlsm?network="+network+"&hosts="+hosts
)

const data=await response.json()

let html="<b>Subnets:</b><br>"

data.subnets.forEach(function(s){
html+=s+"<br>"
})

document.getElementById("result").innerHTML=html

}

</script>

</body>

</html>
